services:
  db:
    container_name: vortex-relay-db
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    restart: always
    environment:
      POSTGRES_USER: vortex
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vortex_relay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vortex -d vortex_relay"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
